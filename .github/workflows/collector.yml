name: Recolector de datos

on:
  schedule:
    - cron: '0,20,40 * * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Resolver IP IPv4 de Supabase
        run: |
          # Obtener solo la IP IPv4 del host de Supabase
          IPV4=$(dig +short A db.ykpkiddviwjjrwikvhxe.supabase.co | head -1)
          echo "Supabase IPv4: $IPV4"
          echo "SUPABASE_IPV4=$IPV4" >> $GITHUB_ENV

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Correr el recolector
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_IPV4: ${{ env.SUPABASE_IPV4 }}
          BS_EMAIL:     ${{ secrets.BS_EMAIL }}
          BS_PASSWORD:  ${{ secrets.BS_PASSWORD }}
        run: python datacollector.py
